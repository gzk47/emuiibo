name: Build
on:
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    permissions:
      contents: write

    steps:
      - name: Add safe.directory Update libnx
        run: |
          git config --global --add safe.directory "*"
          # git clone --recurse-submodules https://github.com/switchbrew/libnx.git
          # cd libnx
          # make -j$(nproc) install

      - name: Checkout latest code
        uses: actions/checkout@v6
        with:
          clean: true
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Extract version
        run: |
          APP_NAME="emuiibo"
          VER_FILE="overlay/Makefile"
          KEY="VER_"
          
          VERSION="$(grep -F "$KEY" "$VER_FILE" | grep -oE '[0-9]+' | head -3 | paste -s -d '.')"
          SHORT_HASH="$(git rev-parse --short=7 HEAD)"
          echo "TAG_NAME=v${VERSION}-${SHORT_HASH}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${APP_NAME} v${VERSION} (${SHORT_HASH})" >> "$GITHUB_ENV"

      - name: Prepare Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly-2025-10-01
          override: true
          components: rust-src

      - name: Prepare cargo-nx
        run: cargo install cargo-nx --git https://github.com/aarch64-switch-rs/cargo-nx

      - name: Build emuiibo
        run: |
          make emuiibo -j$(nproc)

          rm -f emuiibo.zip
          cd SdOut
          zip -r ../emuiibo.zip ./

      - name: Update packages
        run: |
          sudo -n apt-get update
          sudo -n apt-get install -y git build-essential zip maven

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build emuiigen
        run: |
          make emuiigen -j$(nproc)

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: |
            emuiibo.zip
            emuiigen/target/emuiigen.jar
